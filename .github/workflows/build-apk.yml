name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Download and setup Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: |
          gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DexPDF-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
